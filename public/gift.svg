<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <linearGradient id="boxBody" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E8DEFF"/>
      <stop offset="50%" stop-color="#D4C5F9"/>
      <stop offset="100%" stop-color="#C4B3F0"/>
    </linearGradient>
    <linearGradient id="boxLid" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F0EAFF"/>
      <stop offset="100%" stop-color="#E0D4FF"/>
    </linearGradient>
    <linearGradient id="ribbon" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#B8A4F6"/>
      <stop offset="100%" stop-color="#9B84E8"/>
    </linearGradient>
    <linearGradient id="bow" x1="30%" y1="0%" x2="70%" y2="100%">
      <stop offset="0%" stop-color="#D4C5F9"/>
      <stop offset="100%" stop-color="#B8A4F6"/>
    </linearGradient>
    <filter id="giftShadow" x="-10%" y="-5%" width="120%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#9B84E8" flood-opacity="0.25"/>
    </filter>
  </defs>
  <g filter="url(#giftShadow)" transform="translate(60,62)">
    <!-- Box body -->
    <rect x="-34" y="-4" width="68" height="40" rx="5" fill="url(#boxBody)"/>
    <!-- Vertical ribbon on body -->
    <rect x="-6" y="-4" width="12" height="40" rx="1" fill="url(#ribbon)" opacity="0.85"/>
    <!-- Lid -->
    <rect x="-38" y="-18" width="76" height="16" rx="4" fill="url(#boxLid)" stroke="#D4C5F9" stroke-width="0.5"/>
    <!-- Vertical ribbon on lid -->
    <rect x="-6" y="-18" width="12" height="16" rx="1" fill="url(#ribbon)" opacity="0.85"/>
    <!-- Bow left -->
    <ellipse cx="-12" cy="-22" rx="12" ry="9" fill="url(#bow)" transform="rotate(-15,-12,-22)"/>
    <ellipse cx="-12" cy="-22" rx="8" ry="5" fill="#E8DEFF" transform="rotate(-15,-12,-22)" opacity="0.6"/>
    <!-- Bow right -->
    <ellipse cx="12" cy="-22" rx="12" ry="9" fill="url(#bow)" transform="rotate(15,12,-22)"/>
    <ellipse cx="12" cy="-22" rx="8" ry="5" fill="#E8DEFF" transform="rotate(15,12,-22)" opacity="0.6"/>
    <!-- Bow center knot -->
    <circle cx="0" cy="-19" r="4" fill="#B8A4F6"/>
    <circle cx="0" cy="-19" r="2.5" fill="#D4C5F9"/>
    <!-- Highlight -->
    <rect x="-32" y="-2" width="22" height="3" rx="1.5" fill="white" opacity="0.35"/>
  </g>
  <!-- Sparkles -->
  <circle cx="30" cy="28" r="2" fill="#FFD96A" opacity="0.7"/>
  <circle cx="88" cy="45" r="1.5" fill="#FFD96A" opacity="0.5"/>
  <circle cx="25" cy="85" r="1.5" fill="#B8A4F6" opacity="0.4"/>
</svg>
